<!DOCTYPE html>
<html>
<head>
  <title>Peace Gang</title>
</head>

<body style="text-align:center; background:black; color:white;">

<h1>🌌 Join Peace Gang</h1>

<form action="/apply" method="POST">
  <input name="username" placeholder="Username" required><br><br>
  <input name="email" placeholder="Email" required><br><br>
  <textarea name="reason" placeholder="Why join?" required></textarea><br><br>

  <select name="division">
    <option value="pvp">⚔️ PvP Army</option>
    <option value="builder">🏗️ Builders</option>
    <option value="banker">💰 Bankers</option>
  </select><br><br>

  <button type="submit">Apply</button>
</form>

<br><br>

<a href="/login.html">
  <button>👑 Admin Login</button>
</a>

</body>
</html>
