<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>👑 Admin Panel</h1>
<div id="apps"></div>

<script>
const user = localStorage.getItem("adminUser");
const pass = localStorage.getItem("adminPass");

if (!user || !pass) location.href = "/login.html";

async function loadApps() {
  const res = await fetch("/applications", {
    headers: {
      "admin-user": user,
      "admin-pass": pass
    }
  });

  if (res.status !== 200) {
    alert("Not authorized");
    location.href = "/login.html";
    return;
  }

  const data = await res.json();
  document.getElementById("apps").innerHTML = "";

  data.forEach(app => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${app.username}</h3>
      <p>${app.email}</p>
      <p>${app.reason}</p>
      <p>Status: ${app.status}</p>

      <select id="rank-${app.id}">
        <option>🪖 Recruit</option>
        <option>🔰 Associate</option>
        <option>💎 Diamond</option>
        <option>🔮 Crystal</option>
        <option>👑 Mastermind</option>
      </select>

      <button onclick="update('${app.id}','accepted')">✅ Accept</button>
      <button onclick="update('${app.id}','denied')">❌ Deny</button>
      <hr>
    `;

    document.getElementById("apps").appendChild(div);
  });
}

async function update(id, status) {
  const rank = document.getElementById("rank-" + id).value;

  await fetch("/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "admin-user": user,
      "admin-pass": pass
    },
    body: JSON.stringify({ id, status, rank })
  });

  loadApps();
}

loadApps();
</script>

</body>
</html>
