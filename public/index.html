<!DOCTYPE html>
<html>
<head>
  <title>Peace Gang</title>

  <!-- ✅ PUT IT HERE -->
  <link rel="stylesheet" href="style.css">

</head>
<body>

<header>Peace Gang</header>
<div class="banner"></div>

<div class="container">
<h2>Join Peace Gang</h2>

<form action="/apply" method="POST">
<input name="username" placeholder="Minecraft Username" required>
<textarea name="reason" placeholder="Why should we trust you?" required></textarea>
<input type="email" name="email" placeholder="Your Email" required>

<select name="division">
<option>PvP</option>
<option>Builder</option>
<option>Banker</option>
</select>

<select name="rank">
<option>Recruit</option>
<option>Associate</option>
<option>Diamond</option>
</select>

<button>Apply</button>
</form>
</div>

</body>
</html>
