<!DOCTYPE html>
<html>
<head>
  <title>Peace Gang</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Peace Gang</header>
<div class="banner"></div>

<div class="container">
<h2>Join Peace Gang</h2>

<form action="/apply" method="POST">
<input name="username" placeholder="Minecraft Username" required>
<textarea name="reason" placeholder="Why should we trust you?" required></textarea>
<input type="email" name="email" placeholder="Your Email" required>

<select name="rank">

  <!-- ⚔️ PvP Army -->
  <option value="Recruit">🪖 Recruit</option>
  <option value="Associate">🔰 Associate</option>
  <option value="Diamond">💎 Diamond</option>
  <option value="Crystal">🔮 Crystal</option>
  <option value="Mastermind">👑 Mastermind</option>

  <!-- 🏗️ Builders -->
  <option value="Apprentice Builder">🧱 Apprentice Builder</option>
  <option value="Builder">🏗️ Builder</option>
  <option value="Architect">📐 Architect</option>
  <option value="Chief Architect">👷‍♂️ Chief Architect</option>

  <!-- 💰 Bankers -->
  <option value="Trainee Banker">💵 Trainee Banker</option>
  <option value="Banker">💰 Banker</option>
  <option value="Treasurer">🏦 Treasurer</option>
  <option value="Financial Master">👑 Financial Master</option>

</select>
<select name="division" id="division" onchange="updateRanks()">
  <option value="pvp">⚔️ PvP Army</option>
  <option value="builder">🏗️ Builders</option>
  <option value="banker">💰 Bankers</option>
</select>
