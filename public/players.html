<!DOCTYPE html>
<html>
<head>
  <title>Players</title>
</head>

<body>

<h1>🏆 Players</h1>
<div id="players"></div>

<script>
async function load() {
  const res = await fetch("/players");
  const data = await res.json();

  const container = document.getElementById("players");

  data.forEach(p => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${p.username}</h3>
      <p>${p.rank}</p>
      <p>${p.division}</p>
      <hr>
    `;

    container.appendChild(div);
  });
}

load();
</script>

</body>
</html>
